<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Nutrient Web SDK - Typescript example</title>
    <link rel="stylesheet" href="index.css" />
    <script src="https://cdn.cloud.pspdfkit.com/pspdfkit-web@1.13.0/nutrient-viewer.js"></script>
  </head>
  <body>
    <div class="toolbar">
      <div class="control-group">
        <label for="documentSelect">Load Document:</label>
        <select id="documentSelect">
          <option value="base-memory-problem-example.pdf">Memory Problem PDF</option>
          <option value="example.pdf">Working Example PDF</option>
        </select>
      </div>
      <div class="control-group">
        <label>Local File:</label>
        <input type="file" class="chooseFile" accept="application/pdf" />
      </div>
      <div class="control-group actions">
        <button id="exportBtn" disabled class="btn primary">Export PDF</button>
        <button id="exportOperationsBtn" disabled class="btn secondary">Export Flattened</button>
        <button id="exportOfficeBtn" disabled class="btn secondary">Export Office</button>
      </div>
    </div>
    <div class="container"></div>
  </body>
</html>
