<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Nutrient Web SDK - Typescript example</title>
    <link rel="stylesheet" href="index.css" />
    <script src="https://cdn.cloud.pspdfkit.com/pspdfkit-web@1.13.0/nutrient-viewer.js"></script>
  </head>
  <body>
    <div>
      <input type="file" class="chooseFile" accept="application/pdf" />
      <button id="loadProblemBtn">Load Memory Problem PDF</button>
      <button id="loadGoodBtn">Load Working Example PDF</button>
      <button id="exportBtn" disabled>Export PDF</button>
      <button id="exportOperationsBtn" disabled>Export Flattened</button>
      <button id="exportOfficeBtn" disabled>Export Office</button>
      <button id="exportInstantJsonBtn" disabled>Export InstantJSON</button>
    </div>
    <br />
    <div class="container"></div>
  </body>
</html>
